name: "Submit to Web Store"
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Use Node.js 20.x
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: 20.x
          cache: "pnpm"
      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47
        with:
          version: 10.28.2
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify Firefox MV3 build
        run: pnpm run build:firefox
      - name: Build and zip Chrome MV3 artifact
        run: pnpm run build -- --zip
      - name: Browser Platform Publish
        uses: PlasmoHQ/bpp@84d2f28fb20ed9e16dfaee1fba3cbc5a3b4ee90f
        with:
          keys: ${{ secrets.SUBMIT_KEYS }}
          artifact: build/chrome-mv3-prod.zip
